name: "Cleanup Caches"
on:
  workflow_run:
    workflows:
      - "Update Pages"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup_caches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install Dependencies
        run: |
          pnpm install

      - name: Cleanup Caches
        run: |
          pnpm run run:cleanup-caches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
